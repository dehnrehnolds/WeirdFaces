<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>WeirdFaces</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>WeirdFaces</h1>
      </header>

      <div id="camera-container">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="canvas"></canvas>
        <div id="loading">
          <div class="spinner"></div>
          <p>Loading face detector...</p>
        </div>
      </div>

      <div id="filters">
        <button class="filter-btn active" data-filter="none">None</button>
        <button class="filter-btn" data-filter="glasses">Glasses</button>
        <button class="filter-btn" data-filter="bunny">Bunny</button>
        <button class="filter-btn" data-filter="hat">Hat</button>
        <button class="filter-btn" data-filter="big-nose">Big Nose</button>
        <button class="filter-btn" data-filter="big-eyes">Big Eyes</button>
        <button class="filter-btn" data-filter="big-mouth">Big Mouth</button>
        <button class="filter-btn" data-filter="wow-face">Wow Face</button>
        <button class="filter-btn" data-filter="tiny-mouth">Tiny Mouth</button>
        <button class="filter-btn" data-filter="big-head">Big Head</button>
        <button class="filter-btn" data-filter="balloon-head">Balloon Head</button>
        <button class="filter-btn" data-filter="beard">Beard</button>
        <button class="filter-btn" data-filter="face-swap">🔄 Face Swap</button>
        <button class="filter-btn" data-filter="hair-color">💇 Hair Color</button>
      </div>

      <!-- ── Hair color picker (shown only when Hair Color filter is active) ── -->
      <div id="hair-picker" class="hidden">
        <div id="hair-picker-main">
          <canvas id="color-wheel" width="150" height="150"></canvas>
          <div id="hair-picker-right">
            <div id="hair-color-preview"></div>
            <canvas id="brightness-strip" width="32" height="120"></canvas>
          </div>
        </div>
        <div class="hair-swatches">
          <button class="hair-swatch" title="Black"></button>
          <button class="hair-swatch" title="Dark Brown"></button>
          <button class="hair-swatch" title="Brown"></button>
          <button class="hair-swatch" title="Blonde"></button>
          <button class="hair-swatch" title="Red"></button>
          <button class="hair-swatch" title="Pink"></button>
          <button class="hair-swatch" title="Blue"></button>
          <button class="hair-swatch" title="Purple"></button>
        </div>
      </div>

      <div id="face-swap-error" class="hidden">
        <span id="face-swap-error-msg"></span>
      </div>

      <div id="bottom-bar">
        <button id="snap-btn">📸 Snap</button>
        <button id="gallery-btn">🖼️ Gallery</button>
      </div>
    </div>

    <!-- ── Gallery panel ───────────────────────────────────────────── -->
    <div id="gallery-panel">
      <div id="gallery-header">
        <h2>Saved Faces</h2>
        <button id="gallery-close">✕</button>
      </div>
      <div id="gallery-grid"></div>
      <div id="gallery-empty">
        <p>No snaps yet — hit 📸 to save one!</p>
      </div>
    </div>

    <!-- ── Lightbox ────────────────────────────────────────────────── -->
    <div id="lightbox">
      <button id="lightbox-close">✕</button>
      <img id="lightbox-img" src="" alt="Snapped face" />
      <div id="lightbox-actions">
        <button id="lightbox-share">⬆️ Share</button>
        <button id="lightbox-delete">🗑️ Delete</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/gallery.js"></script>
  </body>
</html>
